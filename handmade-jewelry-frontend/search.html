<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 匠心手作</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a href="#main-content" class="skip-to-content">跳转到主要内容</a>

    <header class="header" role="banner">
        <div class="header-content">
            <a href="index.html" class="logo" aria-label="匠心手作 - 返回首页">
                <span class="logo-icon" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </span>
                <span class="logo-text">匠心手作</span>
            </a>
            <nav class="nav-menu" id="navMenu" aria-label="主导航">
                <a href="index.html" class="nav-item">首页</a>
                <a href="index.html#new-arrivals" class="nav-item">新品上市</a>
                <a href="index.html#products" class="nav-item">全部商品</a>
                <a href="index.html#categories" class="nav-item">分类</a>
                <a href="profile.html" class="nav-item">我的</a>
            </nav>
            <div class="header-actions">
                <div class="search-box" role="search" aria-label="站内搜索">
                    <input type="text" placeholder="搜索商品..." id="headerSearchInput" aria-label="搜索商品">
                    <button class="search-btn" aria-label="搜索">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>
                <a href="cart.html" class="cart-btn" aria-label="购物车">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>
                <button class="user-btn" onclick="showLoginModal()" aria-label="用户登录">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()" aria-label="打开菜单" aria-expanded="false">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <div class="search-container">
            <div class="search-header">
                <div class="search-box-large">
                    <input type="text" class="search-input-large" id="searchInput" placeholder="搜索戒指、项链、耳环..." aria-label="搜索关键词">
                    <button class="search-btn-large" onclick="performSearch()" aria-label="执行搜索">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        搜索
                    </button>
                </div>

                <div class="search-filters" role="group" aria-label="分类筛选">
                    <button class="filter-chip active" onclick="filterByCategory('all')" aria-pressed="true">全部</button>
                    <button class="filter-chip" onclick="filterByCategory('rings')" aria-pressed="false">戒指</button>
                    <button class="filter-chip" onclick="filterByCategory('earrings')" aria-pressed="false">耳环</button>
                    <button class="filter-chip" onclick="filterByCategory('necklaces')" aria-pressed="false">项链</button>
                    <button class="filter-chip" onclick="filterByCategory('bracelets')" aria-pressed="false">手链</button>
                    <button class="filter-chip" onclick="filterByCategory('gift-sets')" aria-pressed="false">礼盒套装</button>
                </div>

                <div class="search-history" id="searchHistory" style="display: none;">
                    <div class="history-title">最近搜索</div>
                    <div class="history-tags" id="historyTags" role="list" aria-label="搜索历史"></div>
                </div>
            </div>

            <div class="search-results">
                <div class="results-header">
                    <div class="results-count" id="resultsCount" aria-live="polite">找到 <strong>0</strong> 个商品</div>
                    <div class="sort-options">
                        <span class="sort-label">排序:</span>
                        <select class="sort-select" id="sortSelect" onchange="sortResults()" aria-label="排序方式">
                            <option value="relevance">相关性</option>
                            <option value="price-asc">价格从低到高</option>
                            <option value="price-desc">价格从高到低</option>
                            <option value="rating">评分最高</option>
                            <option value="newest">最新上架</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid-search" id="searchResults" role="list" aria-label="搜索结果">
                </div>

                <div class="empty-results" id="emptyResults" style="display: none;" role="status">
                    <div class="empty-icon" aria-hidden="true">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="8" x2="14" y2="14"/><line x1="14" y1="8" x2="8" y2="14"/></svg>
                    </div>
                    <h3 class="empty-title">暂无搜索结果</h3>
                    <p class="empty-text">试试其他关键词吧~</p>
                    <button class="search-btn-large" onclick="window.location.href='index.html'">浏览全部商品</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul class="footer-links">
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换货政策</a></li>
                        <li><a href="#">常见问题</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">微信公众号</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">抖音</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul class="footer-links">
                        <li>客服微信: jewelry_handmade</li>
                        <li>邮箱: contact@handmade.com</li>
                        <li>电话: 400-888-8888</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 匠心手作. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search-page.js"></script>
</body>
</html>
