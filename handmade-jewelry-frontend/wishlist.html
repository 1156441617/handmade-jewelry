<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 手作珠宝</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .wishlist-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #666;
            font-size: 15px;
        }

        .wishlist-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .wishlist-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .toolbar-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .select-all-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .select-all-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .toolbar-right {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete {
            background: white;
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        .btn-delete:hover {
            background: #ff4757;
            color: white;
        }

        .btn-cart {
            background: var(--primary-color);
            border: none;
            color: white;
        }

        .btn-cart:hover {
            background: #b8976a;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .wishlist-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .wishlist-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .wishlist-card.selected {
            border: 2px solid var(--primary-color);
        }

        .card-checkbox {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 24px;
            height: 24px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .card-checkbox.checked {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .card-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .card-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            cursor: pointer;
        }

        .card-info {
            padding: 20px;
        }

        .card-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .card-name:hover {
            color: var(--primary-color);
        }

        .card-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .card-btn-cart {
            background: var(--primary-color);
            border: none;
            color: white;
        }

        .card-btn-cart:hover {
            background: #b8976a;
        }

        .card-btn-remove {
            background: white;
            border: 1px solid #ddd;
            color: #666;
        }

        .card-btn-remove:hover {
            border-color: #ff4757;
            color: #ff4757;
        }

        .empty-wishlist {
            text-align: center;
            padding: 100px 20px;
        }

        .empty-icon {
            font-size: 100px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            margin-bottom: 30px;
        }

        .shop-btn {
            padding: 14px 40px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .shop-btn:hover {
            background: #b8976a;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .wishlist-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .wishlist-stats {
                flex-direction: column;
                gap: 20px;
            }

            .wishlist-toolbar {
                flex-direction: column;
                gap: 15px;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">手作珠宝</a>
                <div class="nav-links">
                    <a href="index.html#products">全部商品</a>
                    <a href="index.html#categories">分类</a>
                    <a href="index.html#features">特色服务</a>
                    <a href="#about">关于我们</a>
                </div>
                <div class="nav-actions">
                    <div class="search-box">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                        <button class="search-btn" onclick="performSearch()">🔍</button>
                    </div>
                    <a href="cart.html" class="cart-icon">
                        🛒
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <button class="user-btn" onclick="showLoginModal()">👤</button>
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- 收藏夹内容 -->
    <div class="wishlist-container">
        <div class="page-header">
            <h1 class="page-title">❤️ 我的收藏</h1>
            <p class="page-subtitle" id="wishlistSubtitle">您收藏了 0 件商品</p>
        </div>

        <div id="wishlistContent">
            <!-- 内容将通过JS动态加载 -->
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul>
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul>
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换货政策</a></li>
                        <li><a href="#">常见问题</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul>
                        <li><a href="#">微信公众号</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">抖音</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul>
                        <li>客服微信: jewelry_handmade</li>
                        <li>邮箱: contact@handmade.com</li>
                        <li>电话: 400-888-8888</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 手作珠宝. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 收藏夹页面逻辑
        let wishlist = [];
        let selectedItems = new Set();

        // 初始化
        function initWishlist() {
            loadWishlist();
            renderWishlist();
            updateCartBadge();
        }

        // 加载收藏夹
        function loadWishlist() {
            const wishlistIds = JSON.parse(localStorage.getItem('wishlist') || '[]');
            wishlist = mockProducts.filter(p => wishlistIds.includes(p.id));
        }

        // 渲染收藏夹
        function renderWishlist() {
            const container = document.getElementById('wishlistContent');
            
            if (wishlist.length === 0) {
                renderEmpty(container);
                return;
            }

            renderWithItems(container);
        }

        // 渲染空状态
        function renderEmpty(container) {
            container.innerHTML = `
                <div class="empty-wishlist">
                    <div class="empty-icon">❤️</div>
                    <h2 class="empty-title">收藏夹是空的</h2>
                    <p class="empty-text">快去发现心仪的宝贝吧!</p>
                    <button class="shop-btn" onclick="window.location.href='index.html'">去逛逛</button>
                </div>
            `;
            document.getElementById('wishlistSubtitle').textContent = '您还没有收藏任何商品';
        }

        // 渲染有商品的收藏夹
        function renderWithItems(container) {
            container.innerHTML = `
                <div class="wishlist-stats">
                    <div class="stat-item">
                        <div class="stat-number">${wishlist.length}</div>
                        <div class="stat-label">收藏商品</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${wishlist.filter(p => p.price < 200).length}</div>
                        <div class="stat-label">200元以下</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${wishlist.filter(p => p.badges && p.badges.includes('new')).length}</div>
                        <div class="stat-label">新品</div>
                    </div>
                </div>

                <div class="wishlist-toolbar">
                    <div class="toolbar-left">
                        <button class="select-all-btn" onclick="toggleSelectAll()">全选</button>
                        <span style="color: #666;">已选择 ${selectedItems.size} 件</span>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn-action btn-delete" onclick="removeSelected()">删除选中</button>
                        <button class="btn-action btn-cart" onclick="addSelectedToCart()">加入购物车</button>
                    </div>
                </div>

                <div class="wishlist-grid">
                    ${wishlist.map((product, index) => `
                        <div class="wishlist-card ${selectedItems.has(index) ? 'selected' : ''}" data-index="${index}">
                            <div class="card-checkbox ${selectedItems.has(index) ? 'checked' : ''}" 
                                 onclick="toggleSelect(${index})"></div>
                            <div class="card-image" onclick="viewProduct('${product.id}')">${product.image}</div>
                            <div class="card-info">
                                <div class="card-name" onclick="viewProduct('${product.id}')">${product.name}</div>
                                <div class="card-price">¥${product.price}</div>
                                <div class="card-actions">
                                    <button class="card-btn card-btn-cart" onclick="addToCartFromWishlist('${product.id}')">
                                        加入购物车
                                    </button>
                                    <button class="card-btn card-btn-remove" onclick="removeFromWishlist(${index})">
                                        移除
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('wishlistSubtitle').textContent = `您收藏了 ${wishlist.length} 件商品`;
        }

        // 切换选择
        function toggleSelect(index) {
            if (selectedItems.has(index)) {
                selectedItems.delete(index);
            } else {
                selectedItems.add(index);
            }
            renderWishlist();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            if (selectedItems.size === wishlist.length) {
                selectedItems.clear();
            } else {
                wishlist.forEach((_, index) => selectedItems.add(index));
            }
            renderWishlist();
        }

        // 删除选中
        function removeSelected() {
            if (selectedItems.size === 0) {
                showNotification('请先选择要删除的商品');
                return;
            }

            if (confirm(`确定要删除选中的 ${selectedItems.size} 件商品吗?`)) {
                const indices = Array.from(selectedItems).sort((a, b) => b - a);
                indices.forEach(index => {
                    const productId = wishlist[index].id;
                    let wishlistIds = JSON.parse(localStorage.getItem('wishlist') || '[]');
                    wishlistIds = wishlistIds.filter(id => id !== productId);
                    localStorage.setItem('wishlist', JSON.stringify(wishlistIds));
                });

                selectedItems.clear();
                loadWishlist();
                renderWishlist();
                showNotification('已删除选中商品');
            }
        }

        // 批量加入购物车
        function addSelectedToCart() {
            if (selectedItems.size === 0) {
                showNotification('请先选择要添加的商品');
                return;
            }

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            selectedItems.forEach(index => {
                const product = wishlist[index];
                const existingIndex = cart.findIndex(item => item.id === product.id);
                
                if (existingIndex >= 0) {
                    cart[existingIndex].quantity += 1;
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        image: product.image,
                        quantity: 1
                    });
                }
            });

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showNotification(`已将 ${selectedItems.size} 件商品加入购物车`);
            selectedItems.clear();
            renderWishlist();
        }

        // 从收藏夹添加到购物车
        function addToCartFromWishlist(productId) {
            const product = wishlist.find(p => p.id === productId);
            if (!product) return;

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingIndex = cart.findIndex(item => item.id === productId);

            if (existingIndex >= 0) {
                cart[existingIndex].quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    quantity: 1
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            showNotification('已添加到购物车');
        }

        // 从收藏夹移除
        function removeFromWishlist(index) {
            const product = wishlist[index];
            let wishlistIds = JSON.parse(localStorage.getItem('wishlist') || '[]');
            wishlistIds = wishlistIds.filter(id => id !== product.id);
            localStorage.setItem('wishlist', JSON.stringify(wishlistIds));

            loadWishlist();
            renderWishlist();
            showNotification('已从收藏夹移除');
        }

        // 查看商品详情
        function viewProduct(productId) {
            window.location.href = `product-detail.html?id=${productId}`;
        }

        // 搜索
        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (keyword) {
                window.location.href = `search.html?q=${encodeURIComponent(keyword)}`;
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initWishlist);
    </script>
</body>
</html>
