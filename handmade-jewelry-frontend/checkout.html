<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单结算 - 手作珠宝</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .checkout-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            font-size: 24px;
        }

        /* 收货地址 */
        .address-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .address-option {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .address-option:hover {
            border-color: var(--primary-color);
        }

        .address-option.selected {
            border-color: var(--primary-color);
            background: var(--bg-light);
        }

        .address-radio {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
        }

        .address-option.selected .address-radio {
            border-color: var(--primary-color);
            background: var(--primary-color);
        }

        .address-option.selected .address-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .address-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .address-phone {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .address-detail {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .add-address-btn {
            width: 100%;
            padding: 15px;
            border: 2px dashed #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            transition: all 0.3s ease;
        }

        .add-address-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 商品清单 */
        .order-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-variant {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }

        .item-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .item-quantity {
            font-size: 14px;
            color: #666;
        }

        /* 配送方式 */
        .delivery-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .delivery-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delivery-option:hover {
            border-color: var(--primary-color);
        }

        .delivery-option.selected {
            border-color: var(--primary-color);
            background: var(--bg-light);
        }

        .delivery-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
            position: relative;
        }

        .delivery-option.selected .delivery-radio {
            border-color: var(--primary-color);
        }

        .delivery-option.selected .delivery-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--primary-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .delivery-info {
            flex: 1;
        }

        .delivery-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .delivery-desc {
            font-size: 13px;
            color: #999;
        }

        .delivery-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* 支付方式 */
        .payment-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .payment-option:hover {
            border-color: var(--primary-color);
        }

        .payment-option.selected {
            border-color: var(--primary-color);
            background: var(--bg-light);
        }

        .payment-icon {
            font-size: 28px;
        }

        .payment-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        /* 订单摘要 */
        .checkout-sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .summary-label {
            color: #666;
        }

        .summary-value {
            color: #333;
            font-weight: 500;
        }

        .summary-divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
        }

        .total-label {
            font-size: 16px;
            color: #666;
        }

        .total-value {
            font-size: 28px;
            font-weight: 700;
            color: #ff4757;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .agreement {
            margin-top: 15px;
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .checkout-sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .payment-options {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">手作珠宝</a>
                <div class="nav-links">
                    <a href="index.html#products">全部商品</a>
                    <a href="cart.html">购物车</a>
                </div>
                <div class="nav-actions">
                    <button class="user-btn" onclick="showLoginModal()">👤</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- 结算内容 -->
    <div class="checkout-container">
        <div class="page-header">
            <h1 class="page-title">订单结算</h1>
        </div>

        <div class="checkout-layout">
            <div class="checkout-main">
                <!-- 收货地址 -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span class="section-icon">📍</span>
                        收货地址
                    </h2>
                    <div class="address-list" id="addressList">
                        <div class="address-option selected" onclick="selectAddress(this)">
                            <div class="address-radio"></div>
                            <div class="address-name">张三</div>
                            <div class="address-phone">138****8888</div>
                            <div class="address-detail">北京市朝阳区xxx街道xxx小区x号楼x单元xxx室</div>
                        </div>
                        <div class="address-option" onclick="selectAddress(this)">
                            <div class="address-radio"></div>
                            <div class="address-name">李四</div>
                            <div class="address-phone">139****9999</div>
                            <div class="address-detail">上海市浦东新区xxx路xxx号xxx室</div>
                        </div>
                        <button class="add-address-btn" onclick="addNewAddress()">+ 新增收货地址</button>
                    </div>
                </div>

                <!-- 商品清单 -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span class="section-icon">🛍️</span>
                        商品清单
                    </h2>
                    <div class="order-items" id="orderItems">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 配送方式 -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span class="section-icon">🚚</span>
                        配送方式
                    </h2>
                    <div class="delivery-options">
                        <div class="delivery-option selected" onclick="selectDelivery(this)">
                            <div class="delivery-radio"></div>
                            <div class="delivery-info">
                                <div class="delivery-name">顺丰快递</div>
                                <div class="delivery-desc">预计1-2天送达</div>
                            </div>
                            <div class="delivery-price">¥0</div>
                        </div>
                        <div class="delivery-option" onclick="selectDelivery(this)">
                            <div class="delivery-radio"></div>
                            <div class="delivery-info">
                                <div class="delivery-name">京东物流</div>
                                <div class="delivery-desc">预计2-3天送达</div>
                            </div>
                            <div class="delivery-price">¥0</div>
                        </div>
                    </div>
                </div>

                <!-- 支付方式 -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span class="section-icon">💳</span>
                        支付方式
                    </h2>
                    <div class="payment-options">
                        <div class="payment-option selected" onclick="selectPayment(this)">
                            <div class="payment-icon">💬</div>
                            <div class="payment-name">微信支付</div>
                        </div>
                        <div class="payment-option" onclick="selectPayment(this)">
                            <div class="payment-icon">💰</div>
                            <div class="payment-name">支付宝</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 订单摘要 -->
            <div class="checkout-sidebar">
                <div class="summary-card">
                    <h2 class="section-title">订单摘要</h2>
                    
                    <div class="summary-row">
                        <span class="summary-label">商品总额</span>
                        <span class="summary-value" id="subtotal">¥0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">运费</span>
                        <span class="summary-value">¥0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">优惠</span>
                        <span class="summary-value" style="color: #28a745;">-¥0</span>
                    </div>
                    
                    <div class="summary-divider"></div>
                    
                    <div class="total-row">
                        <span class="total-label">应付总额</span>
                        <span class="total-value" id="totalAmount">¥0</span>
                    </div>
                    
                    <button class="submit-btn" onclick="submitOrder()">提交订单</button>
                    
                    <p class="agreement">提交订单即表示同意《用户服务协议》</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 结算页面逻辑
        let cart = [];
        let selectedAddress = 0;

        // 初始化
        function initCheckout() {
            loadCart();
            renderOrderItems();
            calculateTotal();
        }

        // 加载购物车
        function loadCart() {
            cart = JSON.parse(localStorage.getItem('checkoutCart') || localStorage.getItem('cart') || '[]');
        }

        // 渲染订单商品
        function renderOrderItems() {
            const container = document.getElementById('orderItems');
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">购物车是空的</p>';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="order-item">
                    <div class="item-image">${item.image}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        ${item.variant ? `<div class="item-variant">${item.variant}</div>` : ''}
                        <div class="item-price-row">
                            <span class="item-price">¥${item.price}</span>
                            <span class="item-quantity">x${item.quantity}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 计算总价
        function calculateTotal() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal; // 免运费
            
            document.getElementById('subtotal').textContent = `¥${subtotal.toFixed(0)}`;
            document.getElementById('totalAmount').textContent = `¥${total.toFixed(0)}`;
        }

        // 选择地址
        function selectAddress(element) {
            document.querySelectorAll('.address-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // 选择配送方式
        function selectDelivery(element) {
            document.querySelectorAll('.delivery-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // 选择支付方式
        function selectPayment(element) {
            document.querySelectorAll('.payment-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // 新增地址
        function addNewAddress() {
            showNotification('地址管理功能开发中...');
        }

        // 提交订单
        async function submitOrder() {
            if (cart.length === 0) {
                showNotification('购物车是空的');
                return;
            }

            const total = document.getElementById('totalAmount').textContent;
            
            if (!confirm(`确认提交订单?\n应付金额: ${total}`)) return;
            
            // 尝试调用后端API
            if (typeof OrderAPI !== 'undefined' && typeof TokenManager !== 'undefined' && TokenManager.isLoggedIn()) {
                try {
                    const orderData = {
                        items: cart.map(item => ({
                            product_id: item.id,
                            quantity: item.quantity,
                        })),
                        shipping_name: document.querySelector('.address-option.selected .address-name')?.textContent || '默认收货人',
                        shipping_phone: document.querySelector('.address-option.selected .address-phone')?.textContent || '13800138000',
                        shipping_address: document.querySelector('.address-option.selected .address-detail')?.textContent || '默认地址',
                        payment_method: document.querySelector('.payment-option.selected')?.dataset.method || 'alipay',
                    };
                    
                    const result = await OrderAPI.createOrder(orderData);
                    if (result.success) {
                        showNotification('订单提交成功!');
                        localStorage.removeItem('cart');
                        localStorage.removeItem('checkoutCart');
                        setTimeout(() => window.location.href = 'profile.html', 1500);
                    } else {
                        showNotification(result.message || '订单提交失败', 'error');
                    }
                } catch (e) {
                    showNotification('订单提交失败，请检查后端服务', 'error');
                }
            } else {
                // 降级模式
                showNotification('订单提交成功!');
                localStorage.removeItem('cart');
                localStorage.removeItem('checkoutCart');
                setTimeout(() => window.location.href = 'profile.html', 1500);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initCheckout);
    </script>
</body>
</html>
