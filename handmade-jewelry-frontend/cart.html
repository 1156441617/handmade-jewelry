<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 手作珠宝</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #666;
            font-size: 15px;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        /* 购物车列表 */
        .cart-items-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }

        .select-all {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .checkbox.checked {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .clear-cart-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s ease;
        }

        .clear-cart-btn:hover {
            border-color: #ff4757;
            color: #ff4757;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 60px 100px 1fr auto auto auto;
            gap: 20px;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-checkbox {
            display: flex;
            justify-content: center;
        }

        .item-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-variant {
            font-size: 13px;
            color: #999;
            padding: 4px 10px;
            background: var(--bg-light);
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }

        .item-price {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
        }

        .qty-btn-small {
            width: 35px;
            height: 35px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            transition: all 0.3s ease;
        }

        .qty-btn-small:hover {
            background: var(--bg-light);
        }

        .qty-input-small {
            width: 50px;
            height: 35px;
            border: none;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            text-align: center;
            font-size: 14px;
        }

        .item-total {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            min-width: 100px;
            text-align: right;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .delete-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            border-color: #ff4757;
            color: #ff4757;
        }

        .move-to-wishlist-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s ease;
        }

        .move-to-wishlist-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 空购物车 */
        .empty-cart {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            margin-bottom: 30px;
        }

        .shop-now-btn {
            padding: 14px 40px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .shop-now-btn:hover {
            background: #b8976a;
            transform: translateY(-2px);
        }

        /* 结算栏 */
        .checkout-sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .summary-label {
            color: #666;
        }

        .summary-value {
            color: #333;
            font-weight: 500;
        }

        .summary-value.discount {
            color: #28a745;
        }

        .summary-divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 16px;
            color: #666;
        }

        .total-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .checkout-btn:hover {
            background: #b8976a;
            transform: translateY(-2px);
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .continue-shopping-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .continue-shopping-btn:hover {
            background: var(--bg-light);
        }

        .coupon-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .coupon-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .coupon-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .coupon-apply-btn {
            padding: 12px 20px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .coupon-apply-btn:hover {
            background: #b8976a;
        }

        .available-coupons {
            margin-top: 20px;
        }

        .coupon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .coupon-item:hover {
            background: #f0ebe3;
        }

        .coupon-item.selected {
            background: #fff3cd;
            border: 1px solid var(--primary-color);
        }

        .coupon-code {
            font-weight: 600;
            color: #333;
        }

        .coupon-desc {
            font-size: 13px;
            color: #666;
        }

        .coupon-discount {
            font-size: 18px;
            font-weight: 700;
            color: #ff4757;
        }

        @media (max-width: 1024px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }

            .checkout-sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 50px 80px 1fr;
                gap: 15px;
            }

            .item-price,
            .item-quantity,
            .item-total,
            .item-actions {
                grid-column: span 3;
            }

            .item-actions {
                flex-direction: row;
                justify-content: flex-end;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">手作珠宝</a>
                <div class="nav-links">
                    <a href="index.html#products">全部商品</a>
                    <a href="index.html#categories">分类</a>
                    <a href="index.html#features">特色服务</a>
                    <a href="#about">关于我们</a>
                </div>
                <div class="nav-actions">
                    <div class="search-box">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                        <button class="search-btn">🔍</button>
                    </div>
                    <a href="cart.html" class="cart-icon active">
                        🛒
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <button class="user-btn" onclick="showLoginModal()">👤</button>
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- 购物车内容 -->
    <div class="cart-container">
        <div class="page-header">
            <h1 class="page-title">购物车</h1>
            <p class="page-subtitle" id="cartSubtitle">您的购物车中有 0 件商品</p>
        </div>

        <div id="cartContent">
            <!-- 购物车内容将通过JS动态加载 -->
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul>
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul>
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换货政策</a></li>
                        <li><a href="#">常见问题</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul>
                        <li><a href="#">微信公众号</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">抖音</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul>
                        <li>客服微信: jewelry_handmade</li>
                        <li>邮箱: contact@handmade.com</li>
                        <li>电话: 400-888-8888</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 手作珠宝. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 购物车页面逻辑
        let cart = [];
        let selectedItems = new Set();
        let appliedCoupon = null;

        // 初始化购物车
        function initCart() {
            loadCartFromStorage();
            renderCart();
            updateCartBadge();
        }

        // 从LocalStorage加载购物车
        function loadCartFromStorage() {
            cart = JSON.parse(localStorage.getItem('cart') || '[]');
            // 默认全选
            cart.forEach((item, index) => selectedItems.add(index));
        }

        // 渲染购物车
        function renderCart() {
            const container = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                renderEmptyCart(container);
                return;
            }

            renderCartWithItems(container);
        }

        // 渲染空购物车
        function renderEmptyCart(container) {
            container.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-icon">🛒</div>
                    <h2 class="empty-title">购物车是空的</h2>
                    <p class="empty-text">快去挑选心仪的商品吧!</p>
                    <button class="shop-now-btn" onclick="window.location.href='index.html'">
                        去逛逛
                    </button>
                </div>
            `;
            document.getElementById('cartSubtitle').textContent = '您的购物车是空的';
        }

        // 渲染有商品的购物车
        function renderCartWithItems(container) {
            const subtotal = calculateSubtotal();
            const discount = appliedCoupon ? appliedCoupon.discount : 0;
            const total = subtotal - discount;
            const selectedCount = selectedItems.size;

            container.innerHTML = `
                <div class="cart-layout">
                    <div class="cart-items-section">
                        <div class="cart-header">
                            <div class="select-all" onclick="toggleSelectAll()">
                                <div class="checkbox ${selectedItems.size === cart.length ? 'checked' : ''}"></div>
                                <span>全选</span>
                            </div>
                            <button class="clear-cart-btn" onclick="clearCart()">清空购物车</button>
                        </div>
                        ${cart.map((item, index) => `
                            <div class="cart-item">
                                <div class="item-checkbox">
                                    <div class="checkbox ${selectedItems.has(index) ? 'checked' : ''}" 
                                         onclick="toggleItemSelection(${index})"></div>
                                </div>
                                <div class="item-image">${item.image}</div>
                                <div class="item-info">
                                    <div class="item-name">${item.name}</div>
                                    ${item.variant ? `<div class="item-variant">${item.variant}</div>` : ''}
                                </div>
                                <div class="item-price">¥${item.price}</div>
                                <div class="item-quantity">
                                    <button class="qty-btn-small" onclick="updateItemQuantity(${index}, -1)">-</button>
                                    <input type="number" class="qty-input-small" value="${item.quantity}" 
                                           onchange="setItemQuantity(${index}, this.value)" min="1" max="99">
                                    <button class="qty-btn-small" onclick="updateItemQuantity(${index}, 1)">+</button>
                                </div>
                                <div class="item-total">¥${(item.price * item.quantity).toFixed(0)}</div>
                                <div class="item-actions">
                                    <button class="move-to-wishlist-btn" onclick="moveToWishlist(${index})">移入收藏</button>
                                    <button class="delete-btn" onclick="removeFromCart(${index})">删除</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="checkout-sidebar">
                        <div class="summary-card">
                            <h3 class="summary-title">订单摘要</h3>
                            <div class="summary-row">
                                <span class="summary-label">商品小计 (${selectedCount} 件)</span>
                                <span class="summary-value">¥${subtotal.toFixed(0)}</span>
                            </div>
                            <div class="summary-row">
                                <span class="summary-label">运费</span>
                                <span class="summary-value">¥0</span>
                            </div>
                            ${appliedCoupon ? `
                                <div class="summary-row">
                                    <span class="summary-label">优惠券</span>
                                    <span class="summary-value discount">-¥${appliedCoupon.discount}</span>
                                </div>
                            ` : ''}
                            <div class="summary-divider"></div>
                            <div class="total-row">
                                <span class="total-label">合计</span>
                                <span class="total-value">¥${total.toFixed(0)}</span>
                            </div>
                            <button class="checkout-btn" onclick="proceedToCheckout()" ${selectedCount === 0 ? 'disabled' : ''}>
                                去结算
                            </button>
                            <button class="continue-shopping-btn" onclick="window.location.href='index.html'">
                                继续购物
                            </button>
                        </div>

                        <div class="coupon-card">
                            <h3 class="summary-title">优惠券</h3>
                            <div class="coupon-input-group">
                                <input type="text" class="coupon-input" placeholder="输入优惠码" id="couponInput">
                                <button class="coupon-apply-btn" onclick="applyCoupon()">使用</button>
                            </div>
                            <div class="available-coupons">
                                <div class="coupon-item" onclick="selectCoupon('SAVE20', 20)">
                                    <div>
                                        <div class="coupon-code">SAVE20</div>
                                        <div class="coupon-desc">满200可用</div>
                                    </div>
                                    <div class="coupon-discount">¥20</div>
                                </div>
                                <div class="coupon-item" onclick="selectCoupon('SAVE50', 50)">
                                    <div>
                                        <div class="coupon-code">SAVE50</div>
                                        <div class="coupon-desc">满500可用</div>
                                    </div>
                                    <div class="coupon-discount">¥50</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('cartSubtitle').textContent = `您的购物车中有 ${cart.length} 件商品`;
        }

        // 计算小计
        function calculateSubtotal() {
            return cart.reduce((sum, item, index) => {
                return selectedItems.has(index) ? sum + (item.price * item.quantity) : sum;
            }, 0);
        }

        // 切换全选
        function toggleSelectAll() {
            if (selectedItems.size === cart.length) {
                selectedItems.clear();
            } else {
                cart.forEach((_, index) => selectedItems.add(index));
            }
            renderCart();
        }

        // 切换单个商品选择
        function toggleItemSelection(index) {
            if (selectedItems.has(index)) {
                selectedItems.delete(index);
            } else {
                selectedItems.add(index);
            }
            renderCart();
        }

        // 更新商品数量
        function updateItemQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            if (cart[index].quantity > 99) cart[index].quantity = 99;
            saveCart();
            renderCart();
        }

        // 设置商品数量
        function setItemQuantity(index, value) {
            let qty = parseInt(value);
            if (qty < 1) qty = 1;
            if (qty > 99) qty = 99;
            cart[index].quantity = qty;
            saveCart();
            renderCart();
        }

        // 从购物车删除
        function removeFromCart(index) {
            if (confirm('确定要删除这个商品吗?')) {
                cart.splice(index, 1);
                selectedItems.clear();
                cart.forEach((_, i) => selectedItems.add(i));
                saveCart();
                renderCart();
                updateCartBadge();
                showNotification('已从购物车删除');
            }
        }

        // 移入收藏
        function moveToWishlist(index) {
            const item = cart[index];
            let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            
            if (!wishlist.includes(item.id)) {
                wishlist.push(item.id);
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
            }

            removeFromCart(index);
            showNotification('已移入收藏夹');
        }

        // 清空购物车
        function clearCart() {
            if (confirm('确定要清空购物车吗?')) {
                cart = [];
                selectedItems.clear();
                saveCart();
                renderCart();
                updateCartBadge();
                showNotification('购物车已清空');
            }
        }

        // 保存购物车到LocalStorage
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        // 选择优惠券
        function selectCoupon(code, discount) {
            const subtotal = calculateSubtotal();
            const minAmount = code === 'SAVE20' ? 200 : 500;

            if (subtotal < minAmount) {
                showNotification(`订单金额需满¥${minAmount}才能使用此优惠券`);
                return;
            }

            appliedCoupon = { code, discount };
            renderCart();
            showNotification('优惠券已应用');
        }

        // 应用优惠券
        function applyCoupon() {
            const input = document.getElementById('couponInput');
            const code = input.value.trim().toUpperCase();

            if (code === 'SAVE20') {
                selectCoupon('SAVE20', 20);
            } else if (code === 'SAVE50') {
                selectCoupon('SAVE50', 50);
            } else {
                showNotification('无效的优惠码');
            }

            input.value = '';
        }

        // 去结算
        function proceedToCheckout() {
            if (selectedItems.size === 0) {
                showNotification('请选择要结算的商品');
                return;
            }

            const selectedCartItems = cart.filter((_, index) => selectedItems.has(index));
            
            // 模拟跳转到结算页面
            showNotification('正在跳转到结算页面...');
            setTimeout(() => {
                alert('结算功能开发中...\n\n选中的商品:\n' + 
                      selectedCartItems.map(item => `${item.name} x${item.quantity}`).join('\n'));
            }, 500);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initCart);
    </script>
</body>
</html>
