<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 匠心手作</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <a href="#main-content" class="skip-to-content">跳转到主要内容</a>

    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo" aria-label="匠心手作 - 返回首页">
                    <span class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </span>
                    <span class="logo-text">匠心手作</span>
                </a>

                <nav class="nav-menu" id="navMenu" aria-label="主导航">
                    <a href="index.html" class="nav-item">首页</a>
                    <a href="index.html#new-arrivals" class="nav-item">新品上市</a>
                    <a href="index.html#products" class="nav-item">全部商品</a>
                    <a href="index.html#categories" class="nav-item">分类</a>
                    <a href="profile.html" class="nav-item">我的</a>
                </nav>

                <div class="header-actions">
                    <div class="search-box" role="search">
                        <input type="text" placeholder="搜索商品..." id="searchInput" aria-label="搜索商品">
                        <button class="search-btn" aria-label="搜索">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </button>
                    </div>
                    <a href="cart.html" class="cart-btn" aria-label="购物车，当前页面" style="color: var(--gold-light);">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                    <button class="user-btn" onclick="showLoginModal()" aria-label="用户登录">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="打开菜单" aria-expanded="false">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section class="cart-page" aria-labelledby="cart-heading">
            <div class="container">
                <div class="cart-container">
                    <div class="cart-header">
                        <h1 id="cart-heading">购物车</h1>
                        <p class="cart-count-text" id="cartCountText" aria-live="polite">您的购物车中有 0 件商品</p>
                    </div>

                    <div class="cart-content" id="cartContent">
                        <div class="cart-items" id="cartItemsContainer" role="list" aria-label="购物车商品列表"></div>
                        <aside class="cart-summary" id="cartSummary" aria-label="订单摘要"></aside>
                    </div>

                    <div class="empty-state hidden" id="emptyCart" role="status">
                        <div class="empty-icon" aria-hidden="true">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        </div>
                        <p class="empty-text">购物车是空的</p>
                        <a href="index.html" class="btn-primary">去逛逛</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul class="footer-links">
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换政策</a></li>
                        <li><a href="#">尺寸指南</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">抖音直播间</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">微信公众号</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul class="footer-links">
                        <li><a href="#">在线客服</a></li>
                        <li><a href="#">定制咨询</a></li>
                        <li><a href="#">批发合作</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 匠心手作 Jewelry. All rights reserved.
            </div>
        </div>
    </footer>

    <div class="modal" id="authModal" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="关闭对话框">&times;</button>
            <div class="auth-tabs" role="tablist" aria-label="登录注册切换">
                <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true">登录</button>
                <button class="auth-tab" data-tab="register" role="tab" aria-selected="false">注册</button>
            </div>

            <form class="auth-form" id="loginForm" role="tabpanel" aria-label="登录表单">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">邮箱</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary btn-full">登录</button>
                <div style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
                    还没账号？<a href="#" onclick="switchAuthTab('register'); return false;" style="color: var(--gold); text-decoration: none; font-weight: 600;">去注册</a>
                </div>
            </form>

            <form class="auth-form hidden" id="registerForm" role="tabpanel" aria-label="注册表单">
                <div class="form-group">
                    <label class="form-label" for="regUsername">用户名</label>
                    <input type="text" class="form-input" id="regUsername" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regEmail">邮箱</label>
                    <input type="email" class="form-input" id="regEmail" name="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">密码</label>
                    <input type="password" class="form-input" id="regPassword" name="password" placeholder="至少6个字符" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regConfirmPassword">确认密码</label>
                    <input type="password" class="form-input" id="regConfirmPassword" name="confirmPassword" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn-primary btn-full">注册</button>
                <div style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
                    已有账号？<a href="#" onclick="switchAuthTab('login'); return false;" style="color: var(--gold); text-decoration: none; font-weight: 600;">去登录</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart-page.js"></script>
</body>
</html>
