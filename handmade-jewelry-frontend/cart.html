<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 匠心手作</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .cart-page {
            padding: 120px 0 60px;
            min-height: 80vh;
        }

        .cart-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .cart-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .cart-header h1 {
            font-family: var(--font-display);
            font-size: 36px;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .cart-count-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 32px;
            align-items: start;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            gap: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .cart-item:hover {
            border-color: rgba(201, 169, 110, 0.3);
        }

        .cart-item-image {
            width: 90px;
            height: 90px;
            border-radius: var(--radius);
            background: var(--bg-surface);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .cart-item-info {
            flex: 1;
            min-width: 0;
        }

        .cart-item-name {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .cart-item-variant {
            font-size: 12px;
            color: var(--text-muted);
        }

        .cart-item-price {
            font-size: 18px;
            color: var(--gold);
            font-weight: 700;
            margin-top: 6px;
        }

        .cart-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            border-radius: 0;
            font-family: var(--font-body);
            line-height: 1;
            padding: 0;
        }

        .qty-btn:first-child {
            border-radius: 6px 0 0 6px;
        }

        .qty-btn:last-child {
            border-radius: 0 6px 6px 0;
        }

        .qty-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .qty-input {
            width: 48px;
            height: 32px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-left: none;
            border-right: none;
            text-align: center;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: var(--font-body);
            -moz-appearance: textfield;
        }

        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .cart-item-remove {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            font-family: var(--font-body);
            padding: 4px 0;
        }

        .cart-item-remove:hover {
            color: var(--danger);
        }

        .cart-summary {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border);
            position: sticky;
            top: 100px;
        }

        .cart-summary h3 {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .summary-row.total {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-top: 8px;
            font-size: 16px;
        }

        .summary-row.total strong {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--gold);
            font-weight: 700;
        }

        .summary-row.free {
            color: var(--success);
        }

        .btn-checkout {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: var(--gold);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 15px;
            letter-spacing: 0.5px;
            font-family: var(--font-body);
        }

        .btn-checkout:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
            }

            .cart-header h1 {
                font-size: 28px;
            }

            .cart-item {
                padding: 16px;
            }

            .cart-item-image {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <span class="logo-icon">💎</span>
                    <span class="logo-text">匠心手作</span>
                </a>

                <nav class="nav-menu" id="navMenu">
                    <a href="index.html" class="nav-item">首页</a>
                    <a href="index.html#new-arrivals" class="nav-item">新品上市</a>
                    <a href="index.html#products" class="nav-item">全部商品</a>
                    <a href="index.html#categories" class="nav-item">分类</a>
                    <a href="profile.html" class="nav-item">我的</a>
                </nav>

                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                        <button class="search-btn">🔍</button>
                    </div>
                    <a href="cart.html" class="cart-btn" style="color: var(--gold-light);">
                        🛒
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                    <button class="user-btn" onclick="showLoginModal()">👤</button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                </div>
            </div>
        </div>
    </header>

    <section class="cart-page">
        <div class="container">
            <div class="cart-container">
                <div class="cart-header">
                    <h1>购物车</h1>
                    <p class="cart-count-text" id="cartCountText">您的购物车中有 0 件商品</p>
                </div>

                <div class="cart-content" id="cartContent">
                    <div class="cart-items" id="cartItemsContainer"></div>
                    <div class="cart-summary" id="cartSummary"></div>
                </div>

                <div class="empty-state hidden" id="emptyCart">
                    <div class="empty-icon">🛒</div>
                    <p class="empty-text">购物车是空的</p>
                    <a href="index.html" class="btn-primary" style="display: inline-block;">去逛逛</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul class="footer-links">
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换政策</a></li>
                        <li><a href="#">尺寸指南</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">抖音直播间</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">微信公众号</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul class="footer-links">
                        <li><a href="#">在线客服</a></li>
                        <li><a href="#">定制咨询</a></li>
                        <li><a href="#">批发合作</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                © 2026 匠心手作 Jewelry. All rights reserved.
            </div>
        </div>
    </footer>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">登录</button>
                <button class="auth-tab" data-tab="register">注册</button>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-primary btn-full">登录</button>
                <div style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
                    还没账号？<a href="#" onclick="switchAuthTab('register'); return false;" style="color: var(--gold); text-decoration: none; font-weight: 600;">去注册</a>
                </div>
            </form>

            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" name="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" name="password" placeholder="至少6个字符" required>
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" name="confirmPassword" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="btn-primary btn-full">注册</button>
                <div style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
                    已有账号？<a href="#" onclick="switchAuthTab('login'); return false;" style="color: var(--gold); text-decoration: none; font-weight: 600;">去登录</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
    (function() {
        var DEFAULT_CART = [
            { id: '1', name: '月光石编织戒指', price: 168, image: '💍', quantity: 1 },
            { id: '3', name: '水晶能量项链', price: 298, image: '📿', quantity: 1 }
        ];

        function getCart() {
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                cart = DEFAULT_CART;
                localStorage.setItem('cart', JSON.stringify(cart));
            }
            return cart;
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadCart() {
            var cart = getCart();
            var cartContent = document.getElementById('cartContent');
            var emptyCart = document.getElementById('emptyCart');
            var cartCountText = document.getElementById('cartCountText');

            if (cart.length === 0) {
                cartContent.classList.add('hidden');
                emptyCart.classList.remove('hidden');
                if (cartCountText) cartCountText.textContent = '您的购物车中有 0 件商品';
            } else {
                cartContent.classList.remove('hidden');
                emptyCart.classList.add('hidden');
                if (cartCountText) cartCountText.textContent = '您的购物车中有 ' + cart.length + ' 件商品';
                renderCartItems(cart);
                renderSummary(cart);
            }
            updateCartBadge();
        }

        function renderCartItems(items) {
            var container = document.getElementById('cartItemsContainer');
            container.innerHTML = items.map(function(item) {
                return (
                    '<div class="cart-item" data-product-id="' + item.id + '">' +
                        '<div class="cart-item-image">' + item.image + '</div>' +
                        '<div class="cart-item-info">' +
                            '<div class="cart-item-name">' + item.name + '</div>' +
                            '<div class="cart-item-price">¥' + item.price.toFixed(0) + '</div>' +
                            '<div class="cart-item-actions">' +
                                '<div class="cart-item-quantity">' +
                                    '<button class="qty-btn" onclick="CartPage.updateQuantity(\'' + item.id + '\', -1)">−</button>' +
                                    '<input type="number" class="qty-input" value="' + item.quantity + '" min="1" max="99" onchange="CartPage.setQuantity(\'' + item.id + '\', this.value)">' +
                                    '<button class="qty-btn" onclick="CartPage.updateQuantity(\'' + item.id + '\', 1)">+</button>' +
                                '</div>' +
                                '<button class="cart-item-remove" onclick="CartPage.removeItem(\'' + item.id + '\')">删除</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>'
                );
            }).join('');
        }

        function updateQuantity(productId, delta) {
            var cart = getCart();
            var item = cart.find(function(i) { return i.id === productId; });
            if (!item) return;
            item.quantity += delta;
            if (item.quantity < 1) item.quantity = 1;
            if (item.quantity > 99) item.quantity = 99;
            saveCart(cart);
            loadCart();
        }

        function setQuantity(productId, value) {
            var qty = parseInt(value);
            if (isNaN(qty) || qty < 1) qty = 1;
            if (qty > 99) qty = 99;
            var cart = getCart();
            var item = cart.find(function(i) { return i.id === productId; });
            if (!item) return;
            item.quantity = qty;
            saveCart(cart);
            loadCart();
        }

        function removeItem(productId) {
            var cart = getCart();
            cart = cart.filter(function(i) { return i.id !== productId; });
            saveCart(cart);
            loadCart();
            if (typeof showNotification === 'function') {
                showNotification('已从购物车移除');
            }
        }

        function renderSummary(items) {
            var container = document.getElementById('cartSummary');
            var subtotal = items.reduce(function(sum, item) {
                return sum + item.price * item.quantity;
            }, 0);
            var shipping = subtotal >= 99 ? 0 : 15;
            var total = subtotal + shipping;

            container.innerHTML = (
                '<h3>订单摘要</h3>' +
                '<div class="summary-row">' +
                    '<span>商品小计</span>' +
                    '<span>¥' + subtotal.toFixed(0) + '</span>' +
                '</div>' +
                '<div class="summary-row' + (shipping === 0 ? ' free' : '') + '">' +
                    '<span>运费</span>' +
                    '<span>' + (shipping === 0 ? '免运费' : '¥' + shipping.toFixed(0)) + '</span>' +
                '</div>' +
                '<div class="summary-row total">' +
                    '<span>合计</span>' +
                    '<strong>¥' + total.toFixed(0) + '</strong>' +
                '</div>' +
                '<button class="btn-checkout" onclick="CartPage.checkout()">去结算</button>'
            );
        }

        function checkout() {
            var isLoggedIn = (typeof TokenManager !== 'undefined' && TokenManager.isLoggedIn && TokenManager.isLoggedIn())
                || localStorage.getItem('isLoggedIn') === 'true';

            if (!isLoggedIn) {
                if (typeof showLoginModal === 'function') {
                    showLoginModal();
                } else {
                    var modal = document.getElementById('authModal');
                    if (modal) modal.classList.add('show');
                }
                if (typeof showNotification === 'function') {
                    showNotification('请先登录后再结算');
                }
                return;
            }

            var cart = getCart();
            if (cart.length === 0) {
                if (typeof showNotification === 'function') {
                    showNotification('购物车是空的');
                }
                return;
            }

            var subtotal = cart.reduce(function(sum, item) {
                return sum + item.price * item.quantity;
            }, 0);
            var shipping = subtotal >= 99 ? 0 : 15;
            var total = subtotal + shipping;

            var orderData = {
                items: cart.map(function(item) {
                    return {
                        productId: item.id,
                        name: item.name,
                        price: item.price,
                        quantity: item.quantity
                    };
                }),
                address: {
                    name: '张三',
                    phone: '13800138000',
                    province: '浙江省',
                    city: '杭州市',
                    district: '西湖区',
                    detail: '文三路 138 号'
                },
                totalAmount: total,
                shippingFee: shipping,
                remark: ''
            };

            if (typeof OrderAPI !== 'undefined' && typeof OrderAPI.createOrder === 'function') {
                OrderAPI.createOrder(orderData).then(function(result) {
                    if (result.success) {
                        localStorage.removeItem('cart');
                        if (typeof showNotification === 'function') {
                            showNotification('订单创建成功！');
                        }
                        loadCart();
                    } else {
                        if (typeof showNotification === 'function') {
                            showNotification(result.message || '订单创建失败，请稍后重试');
                        }
                    }
                }).catch(function() {
                    if (typeof showNotification === 'function') {
                        showNotification('网络错误，请检查后端服务');
                    }
                });
            } else {
                localStorage.removeItem('cart');
                if (typeof showNotification === 'function') {
                    showNotification('订单已提交！（演示模式）');
                }
                loadCart();
            }
        }

        function updateCartBadge() {
            var cart = getCart();
            var totalItems = cart.reduce(function(sum, item) { return sum + item.quantity; }, 0);
            var badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = totalItems;
                badge.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }

        window.CartPage = {
            loadCart: loadCart,
            updateQuantity: updateQuantity,
            setQuantity: setQuantity,
            removeItem: removeItem,
            checkout: checkout,
            updateCartBadge: updateCartBadge
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();

            var mobileMenuBtn = document.getElementById('mobileMenuBtn');
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', function() {
                    var navMenu = document.getElementById('navMenu');
                    if (navMenu) {
                        navMenu.style.display = navMenu.style.display === 'flex' ? 'none' : 'flex';
                    }
                });
            }

            var modalClose = document.getElementById('modalClose');
            var authModal = document.getElementById('authModal');
            if (modalClose && authModal) {
                modalClose.addEventListener('click', function() {
                    authModal.classList.remove('show');
                });
                authModal.addEventListener('click', function(e) {
                    if (e.target === authModal) authModal.classList.remove('show');
                });
            }

            var authTabs = document.querySelectorAll('.auth-tab');
            authTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    if (typeof switchAuthTab === 'function') {
                        switchAuthTab(this.dataset.tab);
                    } else {
                        var tabs = document.querySelectorAll('.auth-tab');
                        var loginForm = document.getElementById('loginForm');
                        var registerForm = document.getElementById('registerForm');
                        tabs.forEach(function(t) { t.classList.remove('active'); });
                        this.classList.add('active');
                        if (this.dataset.tab === 'login') {
                            loginForm.classList.remove('hidden');
                            registerForm.classList.add('hidden');
                        } else {
                            loginForm.classList.add('hidden');
                            registerForm.classList.remove('hidden');
                        }
                    }
                });
            });

            var loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    if (typeof handleLogin === 'function') {
                        handleLogin(e);
                    }
                });
            }

            var registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    if (typeof handleRegister === 'function') {
                        handleRegister(e);
                    }
                });
            }

            var searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && typeof searchProducts === 'function') {
                        searchProducts(this.value);
                    }
                });
            }
        });
    })();
    </script>
</body>
</html>
