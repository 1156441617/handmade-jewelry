<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 匠心手作</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <a class="skip-to-content" href="#mainContent">跳转到主要内容</a>

    <header class="header" id="header" role="banner">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo" aria-label="匠心手作 - 返回首页">
                    <span class="logo-icon" aria-hidden="true">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="22" x2="12" y2="15.5"/><polyline points="22 8.5 12 15.5 2 8.5"/><polyline points="2 15.5 12 8.5 22 15.5"/><line x1="12" y1="2" x2="12" y2="8.5"/></svg>
                    </span>
                    <span class="logo-text">匠心手作</span>
                </a>
                <nav class="nav-menu" id="navMenu" aria-label="主导航">
                    <a href="index.html" class="nav-item">首页</a>
                    <a href="index.html#products" class="nav-item">全部商品</a>
                    <a href="index.html#categories" class="nav-item">分类</a>
                    <a href="profile.html" class="nav-item active" aria-current="page">我的</a>
                </nav>
                <div class="header-actions">
                    <div class="search-box" role="search">
                        <input type="text" placeholder="搜索商品..." id="searchInput" aria-label="搜索商品">
                        <button class="search-btn" aria-label="搜索">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </button>
                    </div>
                    <a href="cart.html" class="cart-btn" aria-label="购物车">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="cart-badge" id="cartBadge" aria-label="购物车商品数量">0</span>
                    </a>
                    <button class="user-btn" onclick="showLoginModal()" aria-label="用户中心">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="打开菜单" aria-expanded="false">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-layout">
            <aside class="profile-sidebar" aria-label="个人中心导航">
                <div class="user-card">
                    <div class="user-avatar" id="userAvatar" aria-hidden="true">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="user-name" id="userName">未登录</div>
                    <div class="user-level">普通会员</div>
                </div>
                <ul class="side-nav" role="tablist" aria-label="个人中心选项卡">
                    <li class="side-nav-item active" role="tab" aria-selected="true" tabindex="0" onclick="switchTab('orders')" onkeydown="if(event.key==='Enter')switchTab('orders')">
                        <span class="side-nav-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                        </span>
                        我的订单
                    </li>
                    <li class="side-nav-item" role="tab" aria-selected="false" tabindex="0" onclick="switchTab('profile')" onkeydown="if(event.key==='Enter')switchTab('profile')">
                        <span class="side-nav-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        个人信息
                    </li>
                    <li class="side-nav-item" role="tab" aria-selected="false" tabindex="0" onclick="switchTab('addresses')" onkeydown="if(event.key==='Enter')switchTab('addresses')">
                        <span class="side-nav-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        </span>
                        收货地址
                    </li>
                    <li class="side-nav-item" role="tab" aria-selected="false" tabindex="0" onclick="switchTab('wishlist')" onkeydown="if(event.key==='Enter')switchTab('wishlist')">
                        <span class="side-nav-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        </span>
                        我的收藏
                    </li>
                    <li class="side-nav-item" role="tab" aria-selected="false" tabindex="0" onclick="logout()" onkeydown="if(event.key==='Enter')logout()">
                        <span class="side-nav-icon" aria-hidden="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </span>
                        退出登录
                    </li>
                </ul>
            </aside>

            <main class="profile-main" id="mainContent" role="tabpanel" aria-label="个人中心内容">
            </main>
        </div>
    </div>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>关于我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">品牌故事</a></li>
                        <li><a href="#">设计理念</a></li>
                        <li><a href="#">工艺流程</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>客户服务</h3>
                    <ul class="footer-links">
                        <li><a href="#">配送说明</a></li>
                        <li><a href="#">退换政策</a></li>
                        <li><a href="#">尺寸指南</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>关注我们</h3>
                    <ul class="footer-links">
                        <li><a href="#">抖音直播间</a></li>
                        <li><a href="#">小红书</a></li>
                        <li><a href="#">微信公众号</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>联系方式</h3>
                    <ul class="footer-links">
                        <li><a href="#">在线客服</a></li>
                        <li><a href="#">定制咨询</a></li>
                        <li><a href="#">批发合作</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 匠心手作 Jewelry. All rights reserved.
            </div>
        </div>
    </footer>

    <div class="modal" id="authModal" role="dialog" aria-modal="true" aria-label="用户认证">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
            <div class="auth-tabs" role="tablist" aria-label="登录或注册">
                <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true" aria-controls="loginForm">登录</button>
                <button class="auth-tab" data-tab="register" role="tab" aria-selected="false" aria-controls="registerForm">注册</button>
            </div>
            <form class="auth-form" id="loginForm" role="tabpanel" aria-label="登录表单">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">邮箱</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-full">登录</button>
            </form>
            <form class="auth-form hidden" id="registerForm" role="tabpanel" aria-label="注册表单">
                <div class="form-group">
                    <label class="form-label" for="regUsername">用户名</label>
                    <input type="text" class="form-input" name="username" id="regUsername" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regEmail">邮箱</label>
                    <input type="email" class="form-input" name="email" id="regEmail" placeholder="请输入邮箱" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regPassword">密码</label>
                    <input type="password" class="form-input" name="password" id="regPassword" placeholder="至少6个字符" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="regConfirmPassword">确认密码</label>
                    <input type="password" class="form-input" name="confirmPassword" id="regConfirmPassword" placeholder="再次输入密码" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary btn-full">注册</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile-page.js"></script>
</body>
</html>
